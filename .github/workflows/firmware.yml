name: firmware

# For now, this workflow is used for checks, not for releases.
# So all release stuff is commented out.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request: {}

permissions:
  contents: write

jobs:
  # ── Step 1: Read languages.txt and determine build matrix dynamically ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.set-matrix.outputs.languages }}
      is_release: ${{ steps.set-matrix.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Build language matrix
        id: set-matrix
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Tag push → build every language from languages.txt in parallel
            LANGS=$(cat languages.txt | jq -R -s -c 'split("\n") | map(select(. != ""))')
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            # PR / branch push → build default language only
            LANGS='["default"]'
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi
          echo "languages=$LANGS" >> $GITHUB_OUTPUT
          echo "Matrix: $LANGS"

  # ── Step 2: Build each language in parallel via matrix strategy ─────────
  keira:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: ${{ fromJson(needs.prepare.outputs.languages) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── PlatformIO cache (key invalidates on config changes) ───────────
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ./.pio
          key: ${{ runner.os }}-pio-${{ matrix.lang }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.lang }}-
            ${{ runner.os }}-pio-

      # ── ccache for the ESP-IDF / GCC toolchain ─────────────────────────
      - name: Install ccache
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Configure ccache
        run: |
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.lang }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.lang }}-
            ${{ runner.os }}-ccache-

      # ── Python + PIO ───────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio esptool

      # ── Version header ─────────────────────────────────────────────────
      - name: Extract version and generate Keira header
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            # Use prerelease info from event payload if available
            if [[ "${GITHUB_EVENT_NAME}" == "release" && "${GITHUB_EVENT_RELEASE_PRERELEASE}" == "true" ]]; then
              VERSION_TYPE="KEIRA_VERSION_TYPE_PRE_RELEASE"
            else
              VERSION_TYPE="KEIRA_VERSION_TYPE_RELEASE"
            fi
          else
            MAJOR=0
            MINOR=0
            PATCH=0
            VERSION="0.0.0"
            VERSION_TYPE="KEIRA_VERSION_TYPE_DEV"
          fi

          mkdir -p lib/keira/include
          cat > lib/keira/include/keira_version_auto_gen.h <<EOF
          #pragma once
          #ifndef KEIRA_VERSION_AUTO_GEN_H
          #define KEIRA_VERSION_AUTO_GEN_H

          #define KEIRA_VERSION_MAJOR $MAJOR
          #define KEIRA_VERSION_MINOR $MINOR
          #define KEIRA_VERSION_PATCH $PATCH
          #define KEIRA_VERSION_TYPE $VERSION_TYPE

          #endif // KEIRA_VERSION_AUTO_GEN_H
          EOF

          echo "Generated version:"
          cat lib/keira/include/keira_version_auto_gen.h

          # Export outputs for later steps
          echo "MAJOR=$MAJOR" >> $GITHUB_OUTPUT
          echo "MINOR=$MINOR" >> $GITHUB_OUTPUT
          echo "PATCH=$PATCH" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TYPE=$VERSION_TYPE" >> $GITHUB_OUTPUT

      # ── Build ──────────────────────────────────────────────────────────
      - name: Build firmware (${{ matrix.lang }})
        run: |
          mkdir -p out
          LANG="${{ matrix.lang }}"

          if [[ "$LANG" == "default" ]]; then
            echo "Building default language"
            pio run -e v2
            cp .pio/build/v2/firmware.bin out/keira.bin
          else
            echo "Building for $LANG"
            PLATFORMIO_BUILD_FLAGS=-D$LANG pio run -e v2
            cp .pio/build/v2/firmware.bin out/keira_${LANG}.bin
          fi

          cp .pio/build/v2/partitions.bin out/partitions.bin
          cp .pio/build/v2/bootloader.bin out/bootloader.bin

          # Merge into single flashable binary
          if [[ "$LANG" == "default" ]]; then
            esptool.py --chip esp32s3 merge_bin \
              -o out/KeiraOS_merged.bin \
              0x0 out/bootloader.bin \
              0x8000 out/partitions.bin \
              0x10000 out/keira.bin
          else
            esptool.py --chip esp32s3 merge_bin \
              -o out/KeiraOS_merged_${LANG}.bin \
              0x0 out/bootloader.bin \
              0x8000 out/partitions.bin \
              0x10000 out/keira_${LANG}.bin
          fi

      - name: Print ccache stats
        if: always()
        run: ccache --show-stats

      # ── Upload per-language artifact ───────────────────────────────────
      - name: Upload firmware artifact (${{ matrix.lang }})
        uses: actions/upload-artifact@v4
        with:
          name: KeiraOS-firmware-${{ matrix.lang }}
          path: out/*.bin

  # ── Step 3: Collect all per-language artifacts and publish release ──────
  release:
    needs: [prepare, keira]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-firmware
          pattern: KeiraOS-firmware-*
          merge-multiple: true

      - name: Upload firmware artifacts (combined)
        uses: actions/upload-artifact@v4
        with:
          name: KeiraOS-firmware
          path: all-firmware/*.bin

      - name: Upload KeiraOS bins to Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-firmware/*.bin